      expression: 'max(/ZyXEL GS1900-48/icmpping,#5)=0'
      name: 'Switch unreachable'
      priority: DISASTER
      description: 'No ICMP response for 5 consecutive checks'
      tags:
        - tag: scope
          value: availability

    - uuid: 4e3a686800064e889830062104488ba3
      expression: 'min(/ZyXEL GS1900-48/icmppingloss,5m)>{$PING_LOSS_WARN}'
      name: 'High ICMP packet loss'
      priority: WARNING
      tags:
        - tag: scope
          value: availability

    - uuid: f13bb3c65237443cbec8fc3f47e5edbb
      expression: 'last(/ZyXEL GS1900-48/system.uptime)<600'
      name: 'Switch rebooted (uptime < 10 min)'
      priority: WARNING
      description: 'Uptime reset - power cycle, crash, or firmware update'
      tags:
        - tag: scope
          value: availability

    - uuid: 5768a5f9e8634ac99af179b13676c847
      expression: 'avg(/ZyXEL GS1900-48/system.cpu.util,5m)>{$CPU_UTIL_MAX}'
      name: 'High CPU utilization (>{$CPU_UTIL_MAX}%)'
      priority: WARNING
      tags:
        - tag: scope
          value: performance

    - uuid: 877a967d9f094bada19c397bdac241b4
      expression: 'avg(/ZyXEL GS1900-48/system.memory.avail,5m)<{$MEM_AVAIL_MIN}'
      name: 'Low available memory (<{$MEM_AVAIL_MIN}% free)'
      priority: WARNING
      tags:
        - tag: scope
          value: performance

    - uuid: a3f1d2e4b5c64789a1b2c3d4e5f60102
      expression: 'change(/ZyXEL GS1900-48/system.hw.firmware)<>0'
      name: 'Firmware version changed'
      priority: INFO
      description: 'Firmware version has changed since last check'
      tags:
        - tag: scope
          value: inventory

    - uuid: a3f1d2e4b5c64789a1b2c3d4e5f60103
      expression: 'change(/ZyXEL GS1900-48/stp.topology.changes)>0'
      name: 'STP topology change detected'
      priority: WARNING
      description: 'STP topology change count has increased - possible loop or link flap'
      tags:
        - tag: scope
          value: network

    - uuid: a3f1d2e4b5c64789a1b2c3d4e5f60104
