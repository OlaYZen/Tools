          key: net.if.discovery
          delay: 1h
          lifetime: 7d
          description: 'Discovers all ethernetCsmacd (type 6) interfaces via ifTable + ifXTable walk'
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#IFNAME}'
                - '1.3.6.1.2.1.2.2.1.2'
                - '0'
                - '{#IFTYPE}'
                - '1.3.6.1.2.1.2.2.1.3'
                - '0'
