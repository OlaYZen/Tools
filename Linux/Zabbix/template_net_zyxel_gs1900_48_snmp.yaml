zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 98bf814d81dc48d5a2872a681dcb9108
      name: 'Templates/Network devices'
  templates:
    - uuid: c0c9f082ea2a46b489d8abffbfb6269d
      template: 'ZyXEL GS1900-48'
      name: 'ZyXEL GS1900-48 SNMP'
      description: |
        ZyXEL GS1900-48 48-port GbE Smart Managed Switch.
        Requires SNMPv2c. Uses standard IF-MIB, BRIDGE-MIB, LLDP-MIB + ZyXEL enterprise MIB (1.3.6.1.4.1.890.1.15).
        Built for Zabbix 7.4.

        Set macro {$SNMP_COMMUNITY} on the host to your community string.
        Enable SNMP on switch: Management > SNMP > Global Settings.

        GS1900-48: 48x GbE RJ45 + 2x SFP uplinks. Fanless design.

        Items marked [MAY NOT RESPOND] depend on firmware version - verify with snmpget before relying on them.
      groups:
        - name: 'Templates/Network devices'

      macros:
        - macro: '{$SNMP_COMMUNITY}'
          value: public
          description: 'SNMPv2c community string'
        - macro: '{$IF_UTIL_MAX}'
          value: '90'
          description: 'Interface bandwidth utilization % warning threshold'
        - macro: '{$IF_ERRORS_WARN}'
          value: '2'
          description: 'Interface errors/s warning threshold'
        - macro: '{$PING_LOSS_WARN}'
          value: '20'
          description: 'ICMP packet loss % warning threshold'
        - macro: '{$CPU_UTIL_MAX}'
          value: '90'
          description: 'CPU utilization % warning threshold'
        - macro: '{$MEM_AVAIL_MIN}'
          value: '10'
          description: 'Trigger when available memory drops below this % threshold'
        - macro: '{$IF_LINK_DOWN_DISABLE}'
          value: ''
          description: 'Set to any value to suppress link-down triggers on specific interfaces (apply per-host override)'

      valuemaps:
        - uuid: b1ed9efe5d4044de83dcbefcbb2a9ae5
          name: 'IF-MIB::ifAdminStatus'
          mappings:
            - value: '1'
              newvalue: up
            - value: '2'
              newvalue: down
            - value: '3'
              newvalue: testing
        - uuid: f29ed224b2754d09ae778e0c06da85b4
          name: 'IF-MIB::ifOperStatus'
          mappings:
            - value: '1'
              newvalue: up
            - value: '2'
              newvalue: down
            - value: '3'
              newvalue: testing
            - value: '4'
              newvalue: unknown
            - value: '5'
              newvalue: dormant
            - value: '6'
              newvalue: notPresent
            - value: '7'
              newvalue: lowerLayerDown
        - uuid: 2dfce08bebdc4811bd41fc5492213628
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
        - uuid: a3f1d2e4b5c64789a1b2c3d4e5f60010
          name: 'LLDP-MIB::lldpRemChassisIdSubtype'
          mappings:
            - value: '1'
              newvalue: chassisComponent
            - value: '2'
              newvalue: interfaceAlias
            - value: '3'
              newvalue: portComponent
            - value: '4'
              newvalue: macAddress
            - value: '5'
              newvalue: networkAddress
            - value: '6'
              newvalue: interfaceName
            - value: '7'
              newvalue: local
        - uuid: a3f1d2e4b5c64789a1b2c3d4e5f60011
          name: 'BRIDGE-MIB::dot1dStpPortState'
          mappings:
            - value: '1'
              newvalue: disabled
            - value: '2'
              newvalue: blocking
            - value: '3'
              newvalue: listening
            - value: '4'
              newvalue: learning
            - value: '5'
              newvalue: forwarding
            - value: '6'
              newvalue: broken

      items:
        # ── Availability ───────────────────────────────────────────────────────
        - uuid: bef4c70fc20b4f6f9a927b31b30ef81d
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: 1m
          history: 7d
          trends: 365d
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: availability
            - tag: scope
              value: availability
            - tag: layer
              value: L3
            - tag: protocol
              value: ICMP
            - tag: metric_type
              value: gauge
            - tag: mib
              value: SIMPLE

        - uuid: 09db9b8eb5a849f7be4fec89eb02edcf
          name: 'ICMP packet loss'
          type: SIMPLE
          key: icmppingloss
          delay: 1m
          history: 7d
          trends: 365d
          units: '%'
          tags:
            - tag: component
              value: availability
            - tag: scope
              value: availability
            - tag: layer
              value: L3
            - tag: protocol
              value: ICMP
            - tag: metric_type
              value: gauge
            - tag: mib
              value: SIMPLE

        - uuid: 6290fa73c0434de2801567ae1fe8bf63
