              value: availability
            - tag: scope
              value: performance
            - tag: layer
              value: L3
            - tag: protocol
              value: ICMP
            - tag: metric_type
              value: gauge
            - tag: mib
              value: SIMPLE

        # ── System identity (standard MIB-II) ─────────────────────────────────
